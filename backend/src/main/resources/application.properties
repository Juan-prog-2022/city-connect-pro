# DATABASE
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=2

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SERVER
server.port=${PORT:8080}

# LOGS
logging.level.org.springframework.security=DEBUG

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# JWT
jwt.secret=${JWT_SECRET}

# Mercado Pago
mercadopago.access-token=${MP_ACCESS_TOKEN}

mercadopago.notification-url=${MP_NOTIFICATION_URL}

mercadopago.back-urls.success=${FRONTEND_URL}/payment/success
mercadopago.back-urls.failure=${FRONTEND_URL}/payment/failure
mercadopago.back-urls.pending=${FRONTEND_URL}/payment/pending